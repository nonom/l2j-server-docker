services:
  l2j-login-server:
    image: nonom/l2j-server-login:latest
    depends_on:
      l2j-database:
        condition: service_healthy
    environment:
      - L2JLOGIN_DB_INIT=${DB_INIT:-0}
      - L2JLOGIN_DB_HOST=l2j-database
      - L2JLOGIN_DB_PORT=3306
      - L2JLOGIN_DB_NAME=l2jls
      - L2JLOGIN_DB_USER=${DB_USER:-l2jls}
      - L2JLOGIN_DB_PASS=${DB_PASS:-l2jls_password}
      - L2JLOGIN_DB_INSTALL_USER=root
      - L2JLOGIN_DB_INSTALL_PASS=${MARIADB_ROOT_PASSWORD:-root_password}
      - L2JLOGIN_server_GameServerHost=*
      - L2JLOGIN_database_URL=jdbc:mariadb://l2j-database:3306/l2jls
      - L2JLOGIN_database_User=${DB_USER:-l2jls}
      - L2JLOGIN_database_Password=${DB_PASS:-l2jls_password}
    ports:
      - 2106:2106
    networks:
      - default
      - backend

  l2j-game-server:
    image: nonom/l2j-server-game:latest
    depends_on:
      l2j-database:
        condition: service_healthy
    environment:
      - L2JGAME_DB_INIT=${DB_INIT:-0}
      - L2JGAME_DB_HOST=l2j-database
      - L2JGAME_DB_PORT=3306
      - L2JGAME_DB_NAME=l2jgs
      - L2JGAME_DB_USER=${DB_USER:-l2jgs}
      - L2JGAME_DB_PASS=${DB_PASS:-l2jgs_password}
      - L2JGAME_DB_INSTALL_USER=root
      - L2JGAME_DB_INSTALL_PASS=${MARIADB_ROOT_PASSWORD:-root_password}
      - L2JGAME_server_LoginHost=l2j-login-server
      - L2JGAME_server_LoginPort=9014
      - L2JGAME_database_URL=jdbc:mariadb://l2j-database:3306/l2jgs
      - L2JGAME_database_User=${DB_USER:-l2jgs}
      - L2JGAME_database_Password=${DB_PASS:-l2jgs_password}
    volumes:
      - ./data:/opt/l2j/data:rw
      - ./scripts:/opt/l2j/scripts:ro
    ports:
      - 7777:7777
    networks:
      - default
      - backend

  l2j-database:
    image: mariadb:11.8
    volumes:
      - l2j-database-data:/var/lib/mysql:rw
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-root_password}
      - MARIADB_ROOT_HOST=%
      - MARIADB_MYSQL_LOCALHOST_USER=1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  l2j-database-data:

networks:
  backend:
    internal: true
