services:
  l2j-server-login:
    image: nonom/l2j-server-login:latest
    depends_on:
      l2j-database:
        condition: service_healthy
    environment:
      - L2JLOGIN_DB_INIT=${DB_INIT:-0}
      - L2JLOGIN_DB_HOST=l2j-database
      - L2JLOGIN_DB_NAME=${L2JLOGIN_DB_NAME:-l2jls}
      - L2JLOGIN_DB_USER=${L2JLOGIN_DB_USER:-l2jls}
      - L2JLOGIN_DB_PASS=${L2JLOGIN_DB_PASS:-l2jls_password}
      - L2JLOGIN_DB_INSTALL_PASS=${MARIADB_ROOT_PASSWORD:-root_password}
    ports:
      - 2106:2106
    networks:
      - default
      - backend

  l2j-server-game:
    image: nonom/l2j-server-game:latest
    entrypoint: ["sh", "/opt/l2j/scripts/entrypoint.sh"]
    depends_on:
      l2j-database:
        condition: service_healthy
    environment:
      - L2JGAME_DB_INIT=${DB_INIT:-0}
      - L2JGAME_DB_HOST=l2j-database
      - L2JGAME_DB_NAME=${L2JGAME_DB_NAME:-l2jgs}
      - L2JGAME_DB_USER=${L2JGAME_DB_USER:-l2jgs}
      - L2JGAME_DB_PASS=${L2JGAME_DB_PASS:-l2jgs_password}
      - L2JGAME_DB_INSTALL_PASS=${MARIADB_ROOT_PASSWORD:-root_password}
    volumes:
      - ./${DATA_DIR:-data}:${DATA_MOUNT:-/opt/l2j/data}:rw
      - ./scripts:/opt/l2j/scripts:ro
    ports:
      - 7777:7777
    networks:
      - default
      - backend

  l2j-database:
    image: ${MARIADB_IMAGE:-mariadb:11.8}
    volumes:
      - l2j-database-data:/var/lib/mysql:rw
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD:-root_password}
      - MARIADB_ROOT_HOST=%
      - MARIADB_MYSQL_LOCALHOST_USER=1
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  l2j-database-data:

networks:
  backend:
    internal: true
