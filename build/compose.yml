# Build local L2J Server images from sibling repositories.

services:
  l2j-server-login:
    build:
      context: ../l2j-server-login-docker
      dockerfile: Dockerfile
    image: l2j-server-login:local

  l2j-server-game:
    build:
      context: ../l2j-server-game-docker
      dockerfile: ../l2j-server-docker/build/Dockerfile.game
      #additional_contexts:
      #  local-game: ../l2j-server-game
      #  local-datapack: ../l2j-server-datapack
    image: l2j-server-game:local

