# Build override that uses the L2J Server game and login Docker repositories.

services:
  l2j-server-login:
    build:
      context: ../l2j-server-login-docker
      dockerfile: Dockerfile
    image: l2j-server-login:local

  l2j-server-game:
    build:
      context: ../l2j-server-game-docker
      dockerfile: Dockerfile
    image: l2j-server-game:local
