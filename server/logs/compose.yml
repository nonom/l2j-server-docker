# Logs configuration example for L2J game and login server.

services:
  l2j-server-login:
    volumes:
      - ./${DATA_DIR:-data}/logs/login:/opt/l2j/deploy/login/logs:rw

  l2j-server-game:
    env_file:
      - server/logs/.env
    volumes:
      - ./${DATA_DIR:-data}/logs/game:/opt/l2j/deploy/game/logs:rw
